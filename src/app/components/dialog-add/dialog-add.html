<h2 mat-dialog-title>Add To-Do Item</h2>

<mat-dialog-content>
  <form class="todo-form" [formGroup]="todoForm">
    <mat-form-field appearance="outline">
      <mat-label>Task Title</mat-label>
      <input
        matInput
        formControlName="title"
        type="text"
        placeholder="Example: Study Angular Services"
      />

      @if (
        todoForm.controls['title'].invalid &&
        todoForm.controls['title'].touched
      ) {
        <mat-error>Please enter at least 2 characters</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancelClick()">Cancel</button>

  <button
    mat-flat-button
    color="primary"
    type="button"
    (click)="onAddClick()"
  >
    Add
  </button>
</mat-dialog-actions>
