<h2 mat-dialog-title>Add To-Do Item</h2>

<mat-dialog-content>
  <form class="todo-form" [formGroup]="todoForm">
    <mat-form-field appearance="outline">
      <mat-label>Task Title</mat-label>

      <input
        matInput
        formControlName="title"
        type="text"
        autocomplete="off"
      />

      @if (
        todoForm.controls['title'].invalid &&
        todoForm.controls['title'].touched
      ) {
        <mat-error>Please enter at least 2 characters</mat-error>
      } @else {
        <mat-hint>Example: Study Angular Services</mat-hint>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button
    mat-stroked-button
    class="dialog-cancel-button"
    type="button"
    (click)="onCancelClick()"
  >
    Cancel
  </button>

  <button
    mat-flat-button
    class="dialog-add-button"
    type="button"
    (click)="onAddClick()"
  >
    Add Task
  </button>
</mat-dialog-actions>
